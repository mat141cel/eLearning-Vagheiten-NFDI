name: Render and Publish Quarto Site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
          cache: 'pip'
      
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
  
      - name: Install Quarto Live Extension
        run: quarto add r-wasm/quarto-live --no-prompt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Python dependencies for Jupyter
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbformat ipykernel matplotlib

      - name: Render GH version
      - run: quarto render Ressource/ --profile gh-pages --clean

      - name: Render numiscience version
        run: quarto render Ressource/ --profile numiscience --clean

      - name: Prepare deploy folder
        run: |
          mkdir site
          cp -r Ressource/_site_gh/* site/
          cp -r Ressource/_site_numiscience/* site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site